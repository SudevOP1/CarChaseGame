<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Car Chase Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-[#1a1a25] overflow-hidden font-sans">
    <canvas id="gameCanvas" class="block"></canvas>
    <div
      id="ui"
      class="fixed top-5 left-5 text-white text-lg drop-shadow-[0_0_10px_rgba(0,255,255,0.5)] pointer-events-none z-10"
    >
      <div id="score-display" class="mb-2">Busted: 0</div>
      <div id="cops-display" class="mb-2">Cops: 4</div>
      <div id="controls-hint" class="text-sm opacity-70 mt-4">WASD / Arrows to drive | Enter to start</div>
    </div>
    <div id="overlay" class="fixed inset-0 bg-[rgba(10,10,15,0.95)] flex flex-col justify-center items-center text-white z-[100]">
      <h1
        id="overlay-title"
        class="text-6xl mb-2 bg-gradient-to-r from-[#00ffff] to-[#ff00ff] bg-clip-text text-transparent drop-shadow-[0_0_30px_rgba(0,255,255,0.3)] font-bold"
      >
        CarChaseGame
      </h1>
      <p id="overlay-subtitle" class="text-2xl mb-10 opacity-80"></p>
      <button
        id="start-btn"
        class="px-12 py-4 text-2xl bg-gradient-to-r from-[#00ffff] to-[#0088ff] rounded-full text-black cursor-pointer transition-all hover:scale-105 active:scale-95 shadow-[0_0_20px_rgba(0,255,255,0.4)] hover:shadow-[0_0_30px_rgba(0,255,255,0.6)] font-semibold"
      >
        Start Game
      </button>
    </div>
    <script src="game.js"></script>
  </body>
</html>
